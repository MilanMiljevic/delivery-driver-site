<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalfragebogen Wizard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app-container">
        <header class="main-header">
            <h1>Personalfragebogen</h1>
            <p>Bitte ergänzen Sie die fehlenden Angaben und überprüfen Sie die vorhandenen Eintragungen</p>
            <span class="disclaimer">
                Bei den mit * markierten Feldern handelt es sich um Pflichtangaben<br>
                ¹bei fehlender SV-Nummer Pflichtangabe
            </span>
        </header>

        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <main class="wizard-container">
            <form id="wizardForm">

                <section class="form-step active" data-step="1">
                    <div class="step-title">
                        <h2>Allgemeine Angaben</h2>
                    </div>
                    <div class="input-grid">
                        <div class="field"><label>Personal-Nr.:</label><input type="text" name="personal_nr"></div>

                        <div class="field"><label>Name*:</label><input type="text" name="name" required></div>
                        <div class="field"><label>Vorname*:</label><input type="text" name="vorname" required></div>
                        <div class="field"><label>geb. am*:</label><input type="date" name="geb_am" required></div>

                        <div class="field"><label>Geburtsname¹:</label><input type="text" name="geburtsname"></div>
                        <div class="field"><label>Geburtsort¹:</label><input type="text" name="geburtsort"></div>
                        <div class="field"><label>Nationalität¹:</label><input type="text" name="nationalitaet"></div>

                        <div class="field">
                            <label>Geschlecht:</label>
                            <select name="geschlecht" class="custom-select">
                                <option value="" disabled selected>Bitte wählen...</option>
                                <option value="weiblich">weiblich</option>
                                <option value="männlich">männlich</option>
                                <option value="divers">divers</option>
                                <option value="unbestimmt">unbestimmt</option>
                            </select>
                        </div>

                        <div class="field"><label>Geburtsland¹:</label><input type="text" name="geburtsland"></div>

                        <div class="field">
                            <label>Adresse: Straße, Haus-Nr., PLZ, Ort, Land*:</label>
                            <input type="text" name="adresse" required>
                        </div>

                        <div class="field"><label>E-Mail-Adresse:</label><input type="email" name="email"></div>
                        <div class="field"><label>Telefon:</label><input type="tel" name="telefon"></div>
                    </div>
                </section>

                <section class="form-step" data-step="2">
                    <div class="step-title">
                        <h2>Allgemeine Angaben</h2>
                    </div>

                    <div class="form-group">
                        <div class="input-grid">
                            <div class="field full"><label>IBAN:</label><input type="text" name="iban"></div>
                            <div class="field"><label>BIC:</label><input type="text" name="bic"></div>
                            <div class="field"><label>Bank:</label><input type="text" name="bank"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-grid">
                            <div class="field"><label>Ausbildung als:</label><input type="text" name="ausbildung"></div>
                            <div class="field"><label>eingestellt als (Berufsbezeichnung):</label><input type="text"
                                    name="beruf"></div>
                            <div class="field"><label>Bewerbung vom:</label><input type="date" name="bewerbung_datum">
                            </div>
                            <div class="field"><label>Vertragsabschluss am:</label><input type="date"
                                    name="vertrag_datum"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-grid">
                            <div class="field full"><label>Urlaub:</label><input type="text" name="urlaub"></div>
                            <div class="field"><label>Monatsstunden:</label><input type="number" name="monatsstunden">
                            </div>
                            <div class="field"><label>Wochenstunden:</label><input type="number" name="wochenstunden">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-grid">
                            <div class="field"><label>Eintritt:</label><input type="date" name="eintritt"></div>
                            <div class="field"><label>Austritt:</label><input type="date" name="austritt"></div>
                            <div class="field full">
                                <label>Befristung:</label>
                                <select name="befristung" class="custom-select">
                                    <option value="" disabled selected>Bitte wählen...</option>
                                    <option value="ja">Ja</option>
                                    <option value="nein">Nein</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-grid">
                            <div class="field"><label>Fahrerlaubnis/Klasse:</label><input type="text"
                                    name="fuehrerschein"></div>
                            <div class="field"><label>seit:</label><input type="date" name="fuehrerschein_seit"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-grid">
                            <div class="field">
                                <label>Schwerbehinderung:</label>
                                <select name="schwerbehinderung" class="custom-select">
                                    <option value="" disabled selected>Bitte wählen...</option>
                                    <option value="ja">Ja</option>
                                    <option value="nein">Nein</option>
                                </select>
                            </div>
                            <div class="field"><label>Grad:</label><input type="text" name="behinderung_grad"></div>
                        </div>
                    </div>
                </section>

                <footer class="form-footer">
                    <button type="button" id="prevBtn" class="btn-back">Zurück</button>
                    <div class="spacer"></div>
                    <button type="button" id="nextBtn" class="btn-next">Weiter</button>
                </footer>
            </form>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
